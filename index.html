<!DOCTYPE html>
<html>
<head>
    <title>Multimedia Webpage</title>
</head>
<body>

    <h1>Multimedia Webpage</h1>

    <!-- Navigation Links -->
    <a href="#image">Image</a> |
    <a href="#audio">Audio</a> |
    <a href="#video">Video</a> |
    <a href="#website">Website</a>

    <hr>

    <!-- Image Section -->
    <h2 id="image">Image Section</h2>

    <img src="image.jpg" width="400" alt="Sample Image">

    <br><br>

    <!-- Audio Section -->
    <h2 id="audio">Audio Section</h2>

    <audio controls>
        <source src="audio.mp3" type="audio/mpeg">
    </audio>

    <br><br>

    <!-- Video Section -->
    <h2 id="video">Video Section</h2>

    <video width="500" controls>
        <source src="video.mp4" type="video/mp4">
    </video>

    <br><br>

    <!-- Website Section -->
    <h2 id="website">Website Section</h2>

    <iframe
        src="https://www.wikipedia.org"
        width="800"
        height="400">
    </iframe>

</body>
</html>''
